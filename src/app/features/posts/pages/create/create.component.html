<div class="container">
  <h1 class="text-center">Create New Record here.. ☺</h1>

  <button type="button" class="btn btn-warning" (click)="goBack()">
    Back
  </button>

  @if(serverErrorMessage(); as msg) {
    <div class="alert alert-danger">
      {{ msg }}
    </div>
  }
  <app-post-form
    class="mt-3"
    [form]="form"
    [isSubmitting]="isSubmitting()"
    submitLabel='Create Record'
    (submitForm)="submit()"
  />

</div>
