<div class="container">
  <h1 class="text-center">Health Integration Monitor</h1>
  <a routerLink="/post/create/" class="btn btn-success">Create Patient Record</a>


      @if(loadingService.isLoading() && postList().length === 0) {
        <tr>
            <td colspan="4" class="text-center">Loading posts...</td>
        </tr>
      } @else if (hasError()) {
          <div class="text-center">
            <p>We couldn't load the patient records...</p>
           <button type="button" class="btn btn-secondary" (click)="retry()">Retry</button>
          </div>


      }  @else {
          <p>Total records: {{ totalPosts() }}</p>

          <input
            type="text"
            class="form-control mb-3"
            placeholder="Search patient records..."
            [value]="searchTerm()"
            (input)="searchTerm.set($any($event.target).value)"
          />

          <app-post-list-table
            [posts]="filteredPosts()"
            (deletePost)="deletePost($event)"
          />
      }

</div>
