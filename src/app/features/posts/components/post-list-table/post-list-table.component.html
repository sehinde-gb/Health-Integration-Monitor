
<table class="table table-striped">
    <thead>
      <tr>
        <th>Patient Id</th>
        <th>Patient Name</th>
        <th>Message Type</th>
        <th>Status</th>
        <th>Last Updated</th>
        <th width="250px">Actions</th>
      </tr>
    </thead>
    <tbody>
        @for (post of posts(); track post.id) {
          <tr>
            <td>{{post.patientId}}</td>
            <td>{{post.patientName}}</td>
            <td>{{post.messageType}}</td>
            <td>
              <span
                class="badge"
                [ngClass]="{
                  'bg-success': post.status === 'Processed',
                  'bg-warning text-dark': post.status === 'Pending',
                  'bg-danger': post.status === 'Failed'
                }"
                >
                {{ post.status }}
              </span>
            </td>
            <td>{{post.lastUpdated}}</td>
            <td>
              <a [routerLink]="['/post/',post.id,'view']" class="btn btn-info">View</a>
              <a [routerLink]="['/post', post.id, 'edit']" class="btn btn-primary">Edit</a>
              <button class="btn btn-danger" type="button" (click)="deletePost.emit(post.id)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="text-center">
              <p class="mb-0">No patient records found</p>
            </td>
          </tr>
        }
    </tbody>
</table>
