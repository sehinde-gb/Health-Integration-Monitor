<div class="card">
  <div class="card-body">
    <h5 class="card-title mb-4">Record Details</h5>

    <section class="mb-4">
      <h6 class="border-bottom pb-2">Patient Information</h6>

      <p class="card-text">
        <strong>Patient ID:</strong> {{ post.patientId }}
      </p>

      <p class="card-text">
        <strong>Patient Name:</strong> {{ post.patientName }}
      </p>
    </section>

    <section class="mb-4">
      <h6 class="border-bottom pb-2">Message Information</h6>

      <p class="card-text">
        <strong>Message Type:</strong> {{ post.messageType }}
      </p>

      <p class="card-text">
        <strong>Status:</strong> {{ post.status }}
      </p>

      <p class="card-text">
        <strong>Last Updated:</strong> {{ post.lastUpdated | date:'dd MMM yyyy, HH:mm' }}
      </p>
    </section>

    <button class="btn btn-warning" type="button" (click)="back.emit()">
      Back
    </button>
  </div>
</div>
