<div class="card">
    <div class="card-body">
        <h5 class="card-title">{{ post.patientName }}</h5>
        <p class="card-text">Patient ID: {{ post.patientId }}</p>
        <p class="card-text">Message Type: {{ post.messageType }}</p>
        <p class="card-text">Status: {{ post.status }}</p>
        <!-- <p class="card-text">Last Updated: {{ post.lastUpdated }}</p> -->

        <button class="btn btn-warning" type="button" (click)="back.emit()">Back</button>
    </div>
</div>
